# =============================================================================
# Teams Notifications
# =============================================================================
# Sendet Microsoft-Teams-Benachrichtigungen für Repository-Events.
# Nutzt die Reusable-Workflows aus bauer-group/automation-templates.
# =============================================================================

name: Teams Notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, reopened]
    branches: [main]
  release:
    types: [published, prereleased]
  issues:
    types: [opened, closed, reopened]
  workflow_run:
    workflows: ["🐳 Docker Release", "🚀 Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom message to send'
        required: true
        type: string
      channel:
        description: 'Teams channel/webhook name'
        required: false
        type: string
        default: 'general'
  workflow_call:
    inputs:
      notification-level:
        description: 'Notification level: all or errors-only'
        required: false
        type: string
        default: 'errors-only'

jobs:
  notify:
    name: Send Notification
    uses: bauer-group/automation-templates/.github/workflows/teams-notifications.yml@main
    with:
      notification-level: ${{ inputs.notification-level || 'errors-only' }}
    secrets: inherit
