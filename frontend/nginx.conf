# ----------------------------------------------------------------------------
# Nginx-Konfiguration für das Frontend-Image.
#
# - Liefert das gebaute Vite-Bundle aus /usr/share/nginx/html
# - SPA-Fallback: alle nicht gefundenen Routen → index.html
# - Reverse-Proxy für /api und /_ → PocketBase (Host "pocketbase" im
#   docker-compose Netzwerk). Inkl. WebSocket-Upgrade für Realtime.
# - PWA-Cache-Header: Service Worker NICHT cachen, statische Assets lange
# ----------------------------------------------------------------------------

upstream pocketbase_upstream {
  server pocketbase:8090;
  keepalive 16;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen      80;
  server_name _;
  root        /usr/share/nginx/html;
  index       index.html;

  # File-Upload-Größe (Bilder bis 5 MiB + Overhead)
  client_max_body_size 10m;

  # ---- PocketBase Proxy (REST + Realtime + Admin UI) ---------------------
  location ^~ /api/ {
    proxy_pass         http://pocketbase_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # WebSocket-Upgrade für /api/realtime (SSE/WS)
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
    proxy_buffering    off;
  }

  location ^~ /_/ {
    proxy_pass         http://pocketbase_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ---- PWA-spezifische Header --------------------------------------------
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    expires    off;
    try_files  $uri =404;
  }

  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires    off;
    try_files  $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    add_header Content-Type  "application/manifest+json";
    try_files  $uri =404;
  }

  # ---- Statische Assets mit Hash → aggressiv cachen ----------------------
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ---- SPA-Fallback -------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }
}
